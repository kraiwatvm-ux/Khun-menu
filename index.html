<title>ร้านอาหารคุณ · Khun Restaurant · 坤泰式餐厅</title>

<style>
:root{
  --brick:#A63A2A; --brick-deep:#7E2A1E; --gold:#C7873A; --gold-deep:#A86B23;
  --cream:#F7F0E2; --cream-2:#F1E7D2; --paper:#FCF8EF;
  --wood:#5A3A24; --wood-2:#43291A; --ink:#2A211A; --muted:#7C6E5E; --line:#E2D4BC;
  --shadow:0 6px 22px rgba(74,41,26,.12); --maxw:780px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{margin:0;background:var(--cream);color:var(--ink);
  font-family:"Inter","Noto Sans SC","Noto Sans Thai",sans-serif;font-size:16px;line-height:1.45;
  padding-bottom:env(safe-area-inset-bottom)}
body[data-lang="th"]{font-family:"Noto Sans Thai","Inter","Noto Sans SC",sans-serif}
body[data-lang="zh"]{font-family:"Noto Sans SC","Inter","Noto Sans Thai",sans-serif}
img{display:block;max-width:100%}
.wrap{max-width:var(--maxw);margin:0 auto}
.topbar{position:sticky;top:0;z-index:40;background:rgba(126,42,30,.97);backdrop-filter:blur(6px);
  color:#F7EDDD;border-bottom:1px solid rgba(199,135,58,.4)}
.topbar .wrap{display:flex;align-items:center;gap:10px;padding:8px 14px}
.tb-logo{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold);flex:0 0 auto;background:var(--cream)}
.tb-name{font-family:"Fraunces",serif;font-weight:600;font-size:16px;line-height:1.05;letter-spacing:.2px}
.tb-name small{display:block;font-family:inherit;font-weight:400;font-size:10.5px;opacity:.8;letter-spacing:.5px}
.langsw{margin-left:auto;display:flex;background:rgba(0,0,0,.22);border-radius:999px;padding:3px}
.langsw button{border:0;background:transparent;color:#F0E1CB;font:inherit;font-size:13px;font-weight:600;
  padding:5px 11px;border-radius:999px;cursor:pointer;line-height:1;transition:.15s}
.langsw button.on{background:var(--gold);color:#3a2410}
.langsw button:focus-visible{outline:2px solid var(--cream);outline-offset:2px}
.hero{background:radial-gradient(120% 80% at 50% -10%, rgba(199,135,58,.22), transparent 60%),
  linear-gradient(180deg,var(--wood) 0%, var(--wood-2) 100%);
  color:#F6EBD8;padding:26px 18px 30px;text-align:center;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;inset:0;
  background-image:radial-gradient(rgba(247,235,216,.05) 1px, transparent 1px);background-size:16px 16px;opacity:.5;pointer-events:none}
.hero-logo{width:96px;height:96px;border-radius:50%;object-fit:cover;margin:0 auto 14px;
  border:3px solid var(--gold);box-shadow:0 8px 26px rgba(0,0,0,.35);position:relative;z-index:1}
.hero h1{font-family:"Fraunces",serif;font-weight:600;margin:0;font-size:30px;line-height:1.08;letter-spacing:.3px;position:relative;z-index:1}
.hero .h-sub{margin:7px 0 0;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#E7C896;position:relative;z-index:1}
.hero .h-hours{margin:13px 0 0;font-size:14.5px;color:#F0DFC2;position:relative;z-index:1}
.hero .h-cater{display:inline-block;margin:14px auto 0;font-size:13.5px;line-height:1.5;
  background:rgba(247,235,216,.1);border:1px solid rgba(199,135,58,.45);padding:7px 15px;border-radius:999px;position:relative;z-index:1;max-width:340px}
.actions{display:flex;gap:9px;justify-content:center;margin-top:18px;flex-wrap:wrap;position:relative;z-index:1}
.act{display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-weight:600;font-size:14.5px;
  padding:11px 17px;border-radius:13px;border:1px solid transparent;transition:transform .12s, box-shadow .12s}
.act:active{transform:translateY(1px)}
.act.call{background:var(--gold);color:#3a2410;box-shadow:0 4px 14px rgba(199,135,58,.4)}
.act.map,.act.fb{background:transparent;color:#F6EBD8;border-color:rgba(247,235,216,.5)}
.act svg{width:17px;height:17px;flex:0 0 auto}
.act:focus-visible{outline:2px solid var(--cream);outline-offset:2px}
.bone{display:flex;align-items:center;justify-content:center;height:26px;margin:0 auto;max-width:var(--maxw)}
.bone svg{width:160px;height:24px;color:var(--brick);opacity:.55}
.sig{padding:20px 0 6px}
.sig .lab{display:flex;align-items:baseline;gap:10px;padding:0 18px 10px}
.sig .lab .scr{font-family:"Pacifico",cursive;color:var(--brick);font-size:22px;line-height:1}
.sig .lab .cur{color:var(--muted);font-size:13px;font-weight:600}
.sig-scroll{display:flex;gap:13px;overflow-x:auto;padding:2px 18px 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.sig-scroll::-webkit-scrollbar{display:none}
.sig-card{flex:0 0 auto;width:200px;scroll-snap-align:start;background:var(--paper);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line)}
.sig-card img{width:100%;height:132px;object-fit:cover}
.sig-card .b{padding:10px 12px 12px}
.sig-card .b .pri{font-family:"Fraunces",serif;font-weight:700;color:var(--gold-deep);font-size:15px}
.sig-card .b .t1{font-weight:600;font-size:14.5px;margin-top:2px;line-height:1.25}
.sig-card .b .t2{color:var(--muted);font-size:12px;margin-top:3px;line-height:1.3}
.catnav{position:sticky;top:50px;z-index:30;background:var(--cream-2);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.catnav .row{display:flex;gap:7px;overflow-x:auto;padding:9px 14px;-webkit-overflow-scrolling:touch}
.catnav .row::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:var(--paper);color:var(--ink);
  font:inherit;font-size:13.5px;font-weight:600;padding:7px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s}
.chip.on{background:var(--brick);color:#fff;border-color:var(--brick)}
.chip:focus-visible{outline:2px solid var(--brick);outline-offset:2px}
main{padding:6px 0 40px}
.section{padding:24px 16px 6px;scroll-margin-top:104px}
.sec-head{display:flex;align-items:baseline;gap:11px;margin-bottom:6px;border-bottom:2px solid var(--brick);padding-bottom:7px}
.sec-head .scr{font-family:"Pacifico",cursive;color:var(--brick);font-size:25px;line-height:1}
.sec-head .cur{margin-left:auto;color:var(--muted);font-size:13px;font-weight:600;align-self:center}
.subhead{font-weight:700;color:var(--brick-deep);font-size:14px;letter-spacing:.5px;margin:18px 0 2px;padding:5px 0;border-bottom:1px dashed var(--line)}
.item{display:flex;align-items:flex-start;gap:12px;padding:13px 2px;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:0}
.idx{flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:var(--cream-2);color:var(--brick-deep);
  font-family:"Fraunces",serif;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;margin-top:1px;border:1px solid var(--line)}
.thumb{flex:0 0 auto;width:54px;height:54px;border-radius:11px;object-fit:cover;border:1px solid var(--line)}
.it-body{flex:1 1 auto;min-width:0}
.it-1{font-weight:600;font-size:15.5px;line-height:1.3}
.it-2{color:var(--muted);font-size:12.5px;line-height:1.35;margin-top:2px}
.it-price{flex:0 0 auto;text-align:right;padding-left:6px;white-space:nowrap}
.it-price .v{font-family:"Fraunces",serif;font-weight:700;color:var(--gold-deep);font-size:15.5px;line-height:1.2}
.it-price .opt{display:block;color:var(--muted);font-size:11px;font-weight:600;margin-top:1px}
.it-price .ask{font-size:12.5px;color:var(--brick);font-weight:600}
.cur-symbol{font-size:12px;opacity:.7;margin-right:1px}
.foot{background:var(--wood-2);color:#EBDCC4;padding:28px 18px 36px;text-align:center}
.foot .scr{font-family:"Pacifico",cursive;color:var(--gold);font-size:22px;margin-bottom:6px}
.foot .name{font-family:"Fraunces",serif;font-size:20px;font-weight:600;color:#F6EBD8}
.foot .addr{font-size:13.5px;line-height:1.6;color:#D8C4A6;margin-top:8px;max-width:420px;margin-left:auto;margin-right:auto}
.foot .phones{display:flex;flex-direction:column;gap:7px;align-items:center;margin-top:15px}
.foot .phones a{color:#F6EBD8;text-decoration:none;font-weight:600;font-size:15px;border:1px solid rgba(199,135,58,.5);padding:8px 18px;border-radius:11px;min-width:190px}
.foot .fbtns{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.foot .fbtns a{display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-weight:600;font-size:14px;padding:10px 16px;border-radius:11px}
.foot .fbtns a.map{background:var(--gold);color:#3a2410}
.foot .fbtns a.fb{background:rgba(247,235,216,.12);color:#F6EBD8;border:1px solid rgba(247,235,216,.4)}
.foot .fbtns svg{width:16px;height:16px}
.foot .hours{margin-top:16px;font-size:13.5px;color:#D8C4A6}
.hint{background:var(--gold);color:#3a2410;font-weight:600;font-size:13.5px;text-align:center;padding:9px 16px;line-height:1.4}
.hint:empty{display:none}
@media (min-width:640px){.hero h1{font-size:36px}.sig-card{width:222px}}
@media (prefers-reduced-motion:reduce){*{scroll-behavior:auto !important;transition:none !important}}
</style>
</head>

const UI = {"zh": {"name": "坤·泰式餐厅", "tbsub": "沙拉武里 · 农盖", "sub": "泰国 · 沙拉武里府 农盖县", "hours": "营业时间 8:00–21:00", "cater": "承接中式宴席 · 户外自助餐", "call": "打电话", "map": "导航", "fb": "脸书", "addr": "55/1 阔耶, 农盖县, 沙拉武里府 18230", "hint": "点餐时把泰文菜名指给店员看即可 👇", "ask": "请询问店员", "signature": "招牌好菜", "plabels": {"bowl": "碗", "pot": "火锅", "s": "小", "m": "中", "l": "大", "half": "半个菠萝"}}, "en": {"name": "Khun Restaurant", "tbsub": "Nong Khae, Saraburi", "sub": "Nong Khae · Saraburi · Thailand", "hours": "Open daily 8:00–21:00", "cater": "Chinese banquet & outside catering", "call": "Call", "map": "Directions", "fb": "Facebook", "addr": "55/1 Khok Yae, Nong Khae, Saraburi 18230", "hint": "Show the Thai dish name to staff to order 👇", "ask": "Ask staff", "signature": "Signature dishes", "plabels": {"bowl": "Bowl", "pot": "Hot Pot", "s": "S", "m": "M", "l": "L", "half": "½ pineapple"}}, "th": {"name": "ร้านอาหารคุณ", "tbsub": "หนองแค สระบุรี", "sub": "หนองแค · สระบุรี", "hours": "เปิดบริการ 8.00–21.00 น.", "cater": "รับจัดโต๊ะจีน · บุฟเฟต์นอกสถานที่", "call": "โทร", "map": "แผนที่", "fb": "เฟซบุ๊ก", "addr": "55/1 ต.โคกแย้ อ.หนองแค จ.สระบุรี 18230", "hint": "", "ask": "สอบถามราคา", "signature": "เมนูแนะนำ", "plabels": {"bowl": "ชาม", "pot": "หม้อไฟ", "s": "เล็ก", "m": "กลาง", "l": "ใหญ่", "half": "ครึ่งลูก"}}};
const IMG = DATA.img;
let lang = "zh";
const cur = s => '<span class="cur-symbol">฿</span>' + s;
function priceHTML(p){
  if(p===null||p===undefined) return '<span class="ask">'+UI[lang].ask+'</span>';
  const L = UI[lang].plabels;
  if(typeof p === 'string'){
    return '<span class="v">'+p.split(' / ').map(x=>cur(x)).join(' / ')+'</span>';
  }
  if(p.t==='bp')   return '<span class="v">'+cur(p.bowl)+'</span><span class="opt">'+L.bowl+' · '+cur(p.pot)+' '+L.pot+'</span>';
  if(p.t==='sz')   return '<span class="v">'+cur(p.s)+'</span><span class="opt">'+L.s+' · '+cur(p.m)+' '+L.m+' · '+cur(p.l)+' '+L.l+'</span>';
  if(p.t==='sl')   return '<span class="v">'+cur(p.s)+'</span><span class="opt">'+L.s+' · '+cur(p.l)+' '+L.l+'</span>';
  if(p.t==='half') return '<span class="v">'+cur(p.v)+'</span><span class="opt">'+L.half+'</span>';
  return '';
}
function secondLine(it){
  let langs;
  if(lang==='zh') langs=[it.th,it.en];
  else if(lang==='en') langs=[it.th,it.zh];
  else langs=[it.en,it.zh];
  return langs.filter(Boolean).join('  ·  ');
}
function render(){
  const u = UI[lang];
  document.body.setAttribute('data-lang', lang);
  document.documentElement.lang = lang==='zh'?'zh':(lang==='th'?'th':'en');
  document.getElementById('tbLogo').src = IMG.logo;
  document.getElementById('heroLogo').src = IMG.logo;
  document.getElementById('tbName').innerHTML = u.name + '<small>'+u.tbsub+'</small>';
  document.getElementById('hName').textContent = u.name;
  document.getElementById('hSub').textContent = u.sub;
  document.getElementById('hHours').textContent = u.hours;
  document.getElementById('hCater').textContent = u.cater;
  document.getElementById('aCallT').textContent = u.call;
  document.getElementById('aMapT').textContent = u.map;
  document.getElementById('aFbT').textContent = u.fb;
  document.getElementById('hint').textContent = u.hint;
  document.getElementById('sigCur').textContent = u.signature;
  document.getElementById('fName').textContent = u.name;
  document.getElementById('fAddr').textContent = u.addr;
  document.getElementById('fMapT').textContent = u.map;
  document.getElementById('fHours').textContent = u.hours;
  document.querySelectorAll('.langsw button').forEach(b=>b.classList.toggle('on', b.dataset.l===lang));
  const sig = [];
  DATA.menu.rec.forEach(it=>{ if(it.img) sig.push(it); });
  (DATA.menu.rice||[]).forEach(it=>{ if(it.img && sig.indexOf(it)<0) sig.push(it); });
  document.getElementById('sigScroll').innerHTML = sig.map(it=>
    '<div class="sig-card"><img src="'+IMG[it.img]+'" alt="" loading="lazy"><div class="b">'+
    '<div class="pri">'+priceHTML(it.p)+'</div><div class="t1">'+it[lang]+'</div>'+
    '<div class="t2">'+secondLine(it)+'</div></div></div>').join('');
  document.getElementById('catRow').innerHTML = DATA.cats.map(c=>
    '<button class="chip" data-go="sec-'+c.id+'">'+c[lang]+'</button>').join('');
  document.getElementById('main').innerHTML = DATA.cats.map(c=>{
    const items = DATA.menu[c.id]||[];
    const rows = items.map(it=>{
      if(it.sub) return '<div class="subhead">'+it.sub[lang]+'</div>';
      const left = it.img ? '<img class="thumb" src="'+IMG[it.img]+'" alt="" loading="lazy">' : '<div class="idx">'+it.n+'</div>';
      return '<div class="item">'+left+'<div class="it-body"><div class="it-1">'+it[lang]+
        '</div><div class="it-2">'+secondLine(it)+'</div></div><div class="it-price">'+priceHTML(it.p)+'</div></div>';
    }).join('');
    return '<section class="section" id="sec-'+c.id+'"><div class="sec-head"><span class="scr">'+c.script+
      '</span><span class="cur">'+c[lang]+'</span></div>'+rows+'</section>';
  }).join('');
  bindNav();
}
function bindNav(){
  document.querySelectorAll('.chip').forEach(ch=>{
    ch.onclick=()=>{ const el=document.getElementById(ch.dataset.go); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); };
  });
  const chips = [...document.querySelectorAll('.chip')];
  const obs = new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){
      const id='sec-'+e.target.id.replace('sec-','');
      chips.forEach(c=>c.classList.toggle('on', c.dataset.go===e.target.id));
      const on=document.querySelector('.chip.on');
      if(on) on.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
    }});
  },{rootMargin:'-110px 0px -70% 0px',threshold:0});
  document.querySelectorAll('.section').forEach(s=>obs.observe(s));
}
document.querySelectorAll('.langsw button').forEach(b=>{
  b.onclick=()=>{ lang=b.dataset.l; render(); };
});
render();
</script>
